replicaCount: 2
namespace: default
image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
    - port: 443
      targetPort: 8443
      name: https
    - port: 960
      targetPort: 9000
      name: api

# ConfigMap - will be created with name: {{ .Release.Name }}
configmap:
  # binaryData: Base64-encoded binary data (already encoded)
  binaryData:
    binary-file.bin: "YmluYXJ5IGNvbnRlbnQ="
    image.png: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="

# Secret - will be created with name: {{ .Release.Name }}
secret:
  # stringData: Plain text values, Kubernetes will encode them automatically
  stringData:
    app-secret: "plain-text-secret-value"
    credentials.json: |
      {
        "username": "admin",
        "password": "secret123"
      }
